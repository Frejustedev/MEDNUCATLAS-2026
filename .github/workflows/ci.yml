name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Valeurs neutres uniquement pour permettre la compilation.
      # En production, ces variables sont injectées via secrets.
      APP_URL: https://nucleatlas.example.com
      GEMINI_API_KEY: build-placeholder
      FIREBASE_SERVICE_ACCOUNT_B64: ''
      FIREBASE_PROJECT_ID: nucleatlas
      FIREBASE_FIRESTORE_DATABASE_ID: '(default)'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  rules:
    name: Firestore rules tests (emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Java (Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Firestore rules tests
        run: npm run test:rules
